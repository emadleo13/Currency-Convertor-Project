<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مبدل ارز | Currency Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="app-title">مبدل ارز</h1>
            <button id="lang-btn" onclick="toggleLanguage()">English</button>
        </header>

        <div class="converter-card">
            <div class="input-group">
                <label id="amount-label" for="amount">مبلغ</label>
                <input type="number" id="amount" min="0" step="any" placeholder="مبلغ را وارد کنید...">
            </div>

            <div class="currency-row">
                <div class="currency-group">
                    <label id="from-label">از ارز</label>
                    <select id="from-currency">
                        {% for c in currencies %}
                        <option value="{{ c.code }}" {{ 'selected' if c.code == 'USD' }}>
                            {{ c.flag }} {{ c.code }} - {{ c.fa }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <button id="swap-btn" onclick="swapCurrencies()" title="جابجایی ارزها">&#8644;</button>

                <div class="currency-group">
                    <label id="to-label">به ارز</label>
                    <select id="to-currency">
                        {% for c in currencies %}
                        <option value="{{ c.code }}" {{ 'selected' if c.code == 'IRR' }}>
                            {{ c.flag }} {{ c.code }} - {{ c.fa }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button id="convert-btn" onclick="convert()">تبدیل</button>

            <div id="result-box" class="result-box hidden">
                <div id="result-amount" class="result-amount"></div>
                <div id="result-rate" class="result-rate"></div>
                <div id="result-source" class="result-source"></div>
            </div>

            <div id="error-box" class="error-box hidden"></div>
        </div>

        <footer>
            <p id="footer-text">نرخ ارزهای ریالی از tgju.org و سایر ارزها از ExchangeRate-API</p>
        </footer>
    </div>

    <script>
        const CURRENCIES_DATA = {{ currencies | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
