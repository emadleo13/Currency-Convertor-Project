<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter | مبدل ارز</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="app-title">💱 Currency Converter</h1>
            <button id="lang-btn" onclick="toggleLanguage()">فارسی</button>
        </header>

        <div class="converter-card">
            <div class="input-group">
                <label id="amount-label" for="amount">Amount</label>
                <input type="number" id="amount" min="0" step="any" placeholder="Enter amount...">
            </div>

            <div class="currency-row">
                <div class="currency-group" id="from-group">
                    <label id="from-label">From</label>
                    <div class="selected-flag" id="from-trigger">
                        <img class="flag-img" id="from-flag" src="https://flagcdn.com/w40/us.png" alt="USD">
                        <div class="currency-info">
                            <span class="currency-code" id="from-code">USD</span>
                            <span class="currency-name" id="from-name">US Dollar</span>
                        </div>
                        <span class="arrow">▼</span>
                    </div>
                    <input type="hidden" id="from-currency" value="USD">
                </div>

                <button id="swap-btn" onclick="swapCurrencies()" title="Swap currencies">⇄</button>

                <div class="currency-group" id="to-group">
                    <label id="to-label">To</label>
                    <div class="selected-flag" id="to-trigger">
                        <img class="flag-img" id="to-flag" src="https://flagcdn.com/w40/ir.png" alt="IRR">
                        <div class="currency-info">
                            <span class="currency-code" id="to-code">IRR</span>
                            <span class="currency-name" id="to-name">Iranian Rial</span>
                        </div>
                        <span class="arrow">▼</span>
                    </div>
                    <input type="hidden" id="to-currency" value="IRR">
                </div>
            </div>

            <button id="convert-btn" onclick="convert()">Convert</button>

            <div id="result-box" class="result-box hidden">
                <div class="result-flags" id="result-flags"></div>
                <div id="result-amount" class="result-amount"></div>
                <div id="result-rate" class="result-rate"></div>
                <div id="result-source" class="result-source"></div>
            </div>

            <div id="error-box" class="error-box hidden"></div>
        </div>

        <footer>
            <p id="footer-text">IRR rates from tgju.org, other currencies from ExchangeRate-API</p>
        </footer>
    </div>

    <div class="currency-dropdown" id="currency-dropdown">
        <input type="text" class="search-input" id="dropdown-search" placeholder="Search...">
        <div id="dropdown-options"></div>
    </div>

    <script>
        const CURRENCIES_DATA = {{ currencies | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
