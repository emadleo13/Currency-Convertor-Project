<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مبدل ارز | Currency Converter</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="app-title"><span class="title-icon">💱</span>مبدل ارز</h1>
            <button id="lang-btn" onclick="toggleLanguage()">English</button>
        </header>

        <div class="converter-card">
            <div class="input-group">
                <label id="amount-label" for="amount">مبلغ</label>
                <input type="number" id="amount" min="0" step="any" placeholder="مبلغ را وارد کنید...">
            </div>

            <div class="currency-row">
                <div class="currency-group" id="from-group">
                    <label id="from-label">از ارز</label>
                    <div class="selected-flag" id="from-trigger">
                        <span class="flag-emoji" id="from-flag">🇺🇸</span>
                        <div class="currency-info">
                            <span class="currency-code" id="from-code">USD</span>
                            <span class="currency-name" id="from-name">دلار آمریکا</span>
                        </div>
                        <span class="arrow">▼</span>
                    </div>
                    <input type="hidden" id="from-currency" value="USD">
                </div>

                <button id="swap-btn" onclick="swapCurrencies()" title="جابجایی ارزها">⇄</button>

                <div class="currency-group" id="to-group">
                    <label id="to-label">به ارز</label>
                    <div class="selected-flag" id="to-trigger">
                        <span class="flag-emoji" id="to-flag">🇮🇷</span>
                        <div class="currency-info">
                            <span class="currency-code" id="to-code">IRR</span>
                            <span class="currency-name" id="to-name">ریال ایران</span>
                        </div>
                        <span class="arrow">▼</span>
                    </div>
                    <input type="hidden" id="to-currency" value="IRR">
                </div>
            </div>

            <button id="convert-btn" onclick="convert()">تبدیل</button>

            <div id="result-box" class="result-box hidden">
                <div class="result-flags" id="result-flags"></div>
                <div id="result-amount" class="result-amount"></div>
                <div id="result-rate" class="result-rate"></div>
                <div id="result-source" class="result-source"></div>
            </div>

            <div id="error-box" class="error-box hidden"></div>
        </div>

        <footer>
            <p id="footer-text">نرخ ارزهای ریالی از tgju.org و سایر ارزها از ExchangeRate-API</p>
        </footer>
    </div>

    <div class="currency-dropdown" id="currency-dropdown">
        <input type="text" class="search-input" id="dropdown-search" placeholder="جستجو...">
        <div id="dropdown-options"></div>
    </div>

    <script>
        const CURRENCIES_DATA = {{ currencies | tojson }};
    </script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
